<main class="page">
  <div class="breadcrumb">
    <a (click)="navegar('/admin/usuarios')" style="cursor: pointer">Usuários</a>
    <span class="breadcrumb-sep">›</span>
    <span>Editar</span>
  </div>

  <div class="detail-card">
    <div class="detail-card-header">
      <div class="detail-card-icon">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        >
          <circle cx="12" cy="8" r="4" />
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
        </svg>
      </div>
      <div>
        <div class="detail-card-title">Editar Usuário</div>
        <div class="detail-card-subtitle">ID #{{ id }}</div>
      </div>
    </div>

    <div class="detail-card-body">
      @if (erro) {
        <div
          style="
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 8px;
            padding: 11px 15px;
            font-size: 13.5px;
            margin-bottom: 20px;
          "
        >
          {{ erro }}
        </div>
      }

      <div class="detail-form-row detail-form-row-2">
        <div class="field">
          <label>Nome *</label>
          <input type="text" [(ngModel)]="nome" placeholder="Nome completo" />
        </div>
        <div class="field">
          <label>E-mail *</label>
          <input type="email" [(ngModel)]="email" placeholder="usuario@email.com" />
        </div>
      </div>

      <div class="detail-form-row detail-form-row-2">
        <div class="field">
          <label
            >Nova Senha
            <span style="color: var(--text-3); font-weight: 400"
              >(deixe em branco para manter)</span
            ></label
          >
          <input
            type="password"
            [(ngModel)]="senha"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        <div class="field">
          <label>Role *</label>
          <select [(ngModel)]="role">
            <option value="">Selecione</option>
            <option value="ADMIN">ADMIN</option>
            <option value="USER">USER</option>
          </select>
        </div>
      </div>

      <div class="detail-form-row detail-form-row-1">
        <div class="field">
          <label>Empresas *</label>
          <div class="checkbox-grid">
            @for (empresa of empresas; track empresa) {
              <label class="field-checkbox">
                <input
                  type="checkbox"
                  [checked]="empresaSelecionada(empresa.id)"
                  (change)="toggleEmpresa(empresa.id)"
                />
                <span>{{ empresa.nome }}</span>
              </label>
            }
          </div>
        </div>
      </div>

      <div class="detail-actions">
        <button class="btn-primary" (click)="salvar()">Salvar alterações</button>
        <button class="btn-secondary" (click)="navegar('/admin/usuarios')">Cancelar</button>
      </div>
    </div>
  </div>
</main>
