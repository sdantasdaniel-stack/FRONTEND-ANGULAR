<app-navbar />

<main class="page">
  <div class="breadcrumb">
    <a (click)="navegar('/admin/devices')" style="cursor: pointer">Devices</a>
    <span class="breadcrumb-sep">›</span>
    <span>Editar</span>
  </div>

  <div class="detail-card">
    <div class="detail-card-header">
      <div class="detail-card-icon">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        >
          <rect x="5" y="2" width="14" height="20" rx="2" />
          <circle cx="12" cy="17" r="1" fill="currentColor" stroke="none" />
          <path d="M9 7h6M9 11h4" />
        </svg>
      </div>
      <div>
        <div class="detail-card-title">Editar Device</div>
        <div class="detail-card-subtitle">ID #{{ id }}</div>
      </div>
    </div>

    <div class="detail-card-body">
      @if (erro) {
        <div
          style="
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 8px;
            padding: 11px 15px;
            font-size: 13.5px;
            margin-bottom: 20px;
          "
        >
          {{ erro }}
        </div>
      }

      <div class="detail-form-row detail-form-row-2">
        <div class="field">
          <label>Nome *</label>
          <input type="text" [(ngModel)]="nome" placeholder="Nome do device" />
        </div>
        <div class="field">
          <label>Identificador *</label>
          <input type="text" [(ngModel)]="identificador" placeholder="Ex: RT-001" />
        </div>
      </div>

      <div class="detail-form-row detail-form-row-1">
        <div class="field">
          <label>Empresa *</label>
          <select [(ngModel)]="empresaId">
            <option [ngValue]="null">Selecione uma empresa</option>
            @for (e of empresas; track e) {
              <option [ngValue]="e.id">{{ e.nome }}</option>
            }
          </select>
        </div>
      </div>

      <div class="detail-form-row detail-form-row-2">
        <div class="field">
          <label>Latitude (opcional)</label>
          <input type="number" [(ngModel)]="latitude" placeholder="-23.5505" />
        </div>
        <div class="field">
          <label>Longitude (opcional)</label>
          <input type="number" [(ngModel)]="longitude" placeholder="-46.6333" />
        </div>
      </div>

      <div class="detail-actions">
        <button class="btn-primary" (click)="salvar()">Salvar alterações</button>
        <button class="btn-secondary" (click)="navegar('/admin/devices')">Cancelar</button>
      </div>
    </div>
  </div>
</main>
