<app-navbar />

<main class="page">
  <div class="breadcrumb">
    <a (click)="navegar('/admin/empresas')" style="cursor: pointer">Empresas</a>
    <span class="breadcrumb-sep">›</span>
    <span>Editar</span>
  </div>

  <div class="detail-card">
    <div class="detail-card-header">
      <div class="detail-card-icon">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
        >
          <rect x="2" y="7" width="20" height="14" rx="2" />
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" />
        </svg>
      </div>
      <div>
        <div class="detail-card-title">Editar Empresa</div>
        <div class="detail-card-subtitle">ID #{{ id }}</div>
      </div>
    </div>

    <div class="detail-card-body">
      @if (erro) {
        <div
          class="alert-error"
          style="
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            border-radius: 8px;
            padding: 11px 15px;
            font-size: 13.5px;
            margin-bottom: 20px;
          "
        >
          {{ erro }}
        </div>
      }

      <div class="detail-form-row detail-form-row-1">
        <div class="field">
          <label>Nome *</label>
          <input type="text" [(ngModel)]="nome" placeholder="Razão social" />
        </div>
      </div>

      <div class="detail-form-row detail-form-row-2">
        <div class="field">
          <label>CNPJ *</label>
          <input type="text" [(ngModel)]="cnpj" placeholder="00.000.000/0000-00" />
        </div>
        <div class="field">
          <label>E-mail</label>
          <input type="email" [(ngModel)]="email" placeholder="contato@empresa.com.br" />
        </div>
      </div>

      <div class="detail-actions">
        <button class="btn-primary" (click)="salvar()">Salvar alterações</button>
        <button class="btn-secondary" (click)="navegar('/admin/empresas')">Cancelar</button>
      </div>
    </div>
  </div>
</main>
